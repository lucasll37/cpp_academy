name: Release

on:
  push:
    tags:
      - 'v*'          # dispara em: make release VERSION=1.2.3

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: academy-linux.AppImage
          - os: macos-13
            artifact_name: academy-macos.dmg
          - os: windows-latest
            artifact_name: academy-windows-setup.exe

    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.os }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python + Conan ──────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Conan
        run: pip install conan==2.*

      - name: Configure Conan profile
        run: conan profile detect --force

      # ── 3. Qt (por plataforma) ─────────────────────────────
      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libgl1-mesa-dev \
            ninja-build

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6 ninja
          echo "$(brew --prefix qt@6)/bin" >> $GITHUB_PATH

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          arch: 'win64_msvc2019_64'
          tools: 'tools_ninja'

      # ── 4. Meson ───────────────────────────────────────────
      - name: Install Meson
        run: pip install meson

      # ── 5. MSVC environment (Windows only) ─────────────────
      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ── 6. SFML via Conan ──────────────────────────────────
      - name: Install dependencies via Conan
        run: |
          conan install . \
            --build=missing \
            --settings=build_type=Release

      # ── 7. Configure & Build ───────────────────────────────
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          meson setup build \
            --buildtype=release \
            --prefix=$PWD/dist \
            -Dpkg_config_path=$PWD/build

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          meson setup build `
            --buildtype=release `
            --prefix=$env:CD\dist `
            -Dpkg_config_path=$env:CD\build
        shell: pwsh

      - name: Build
        run: meson compile -C build

      - name: Install
        run: meson install -C build

      # ── 8. Empacotar (Linux) ───────────────────────────────
      - name: Generate placeholder icon (Linux)
        if: runner.os == 'Linux'
        run: |
          test -f scripts/academy.png || \
            convert -size 256x256 xc:'#4682B4' -font DejaVu-Sans -pointsize 40 \
              -fill white -gravity center -annotate 0 'Academy' \
              scripts/academy.png

      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          mkdir -p AppDir/usr
          cp -r dist/* AppDir/usr/

          QMAKE=$(which qmake6 || which qmake) \
          ./linuxdeploy-x86_64.AppImage \
            --appimage-extract-and-run \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --executable AppDir/usr/bin/qt_academy \
            --desktop-file scripts/academy.desktop \
            --icon-file scripts/academy.png

          mv Academy*.AppImage academy-linux.AppImage

      # ── 9. Empacotar (macOS) ───────────────────────────────
      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          # meson instala binário plano; macdeployqt precisa de .app bundle
          mkdir -p qt_academy.app/Contents/MacOS
          cp dist/bin/qt_academy qt_academy.app/Contents/MacOS/
          cat > qt_academy.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>qt_academy</string>
            <key>CFBundleIdentifier</key><string>com.academy.qt_academy</string>
            <key>CFBundleName</key><string>Academy</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.0.0</string>
          </dict>
          </plist>
          PLIST
          macdeployqt qt_academy.app -dmg
          mv qt_academy.dmg academy-macos.dmg

      # ── 10. Empacotar (Windows) ────────────────────────────
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          windeployqt dist\bin\qt_academy.exe
          makensis scripts\installer.nsi

      # ── 11. Upload do artefato para a Release ──────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
