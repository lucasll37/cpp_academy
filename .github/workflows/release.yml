name: Release

on:
  push:
    tags:
      - 'v*'          # dispara em: git tag v1.0.0 && git push --tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: academy-linux.AppImage
          - os: macos-13
            artifact_name: academy-macos.dmg
          - os: windows-latest
            artifact_name: academy-windows-setup.exe

    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.os }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python + Conan ──────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Conan
        run: pip install conan==2.*

      - name: Configure Conan profile
        run: conan profile detect --force

      # ── 3. Qt (por plataforma) ─────────────────────────────
      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-tools-dev \
            libgl1-mesa-dev \
            ninja-build

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6 ninja
          echo "$(brew --prefix qt@6)/bin" >> $GITHUB_PATH

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          arch: 'win64_msvc2019_64'
          tools: 'tools_ninja'

      # ── 4. Meson ───────────────────────────────────────────
      - name: Install Meson
        run: pip install meson

      # ── 5. SFML via Conan ──────────────────────────────────
      - name: Install dependencies via Conan
        run: |
          conan install . \
            --build=missing \
            --settings=build_type=Release

      # ── 6. Configure & Build ───────────────────────────────
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          meson setup build \
            --buildtype=release \
            --prefix=$PWD/dist \
            -Dpkg_config_path=$PWD/build

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          meson setup build ^
            --buildtype=release ^
            --prefix=%CD%\dist ^
            -Dpkg_config_path=%CD%\build

      - name: Build
        run: meson compile -C build

      - name: Install
        run: meson install -C build

      # ── 7. Empacotar (Linux) ───────────────────────────────
      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          # baixa linuxdeploy e plugin Qt
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # monta o AppDir
          mkdir -p AppDir/usr
          cp -r dist/* AppDir/usr/

          # gera o AppImage
          QMAKE=$(which qmake6 || which qmake) \
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --executable AppDir/usr/bin/qt_academy \
            --desktop-file scripts/academy.desktop \
            --icon-file scripts/academy.png

          mv Academy*.AppImage academy-linux.AppImage

      # ── 8. Empacotar (macOS) ───────────────────────────────
      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          # macdeployqt já vem com o Qt instalado via brew
          macdeployqt dist/qt_academy.app -dmg
          mv qt_academy.dmg academy-macos.dmg

      # ── 9. Empacotar (Windows) ─────────────────────────────
      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          # windeployqt copia as DLLs necessárias
          windeployqt dist\qt_academy.exe

          # NSIS gera o installer
          makensis scripts\installer.nsi

      # ── 10. Upload do artefato para a Release ──────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}